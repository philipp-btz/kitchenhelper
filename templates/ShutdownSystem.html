<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Safe Shutdown</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      .danger { color: #b00020; font-weight: 700; }
      button { padding: 0.75rem 1rem; }
      input[type="password"] { padding: 0.5rem; width: min(480px, 100%); }
      .box { max-width: 640px; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1 class="danger">Shutdown this system</h1>
      <p>This will stop the machine immediately.</p>

      <form method="post" action="/save-shutdown">
        <p>
          <label>
            Password:<br />
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
        </p>

        <p>
          <label>
            <input type="checkbox" name="confirm" value="yes" required />
            Yes, I really want to shut down this system.
          </label>
        </p>

        <button type="submit">Shut down now</button>
      </form>
    </div>
  </body>
</html>
