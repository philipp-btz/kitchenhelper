<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <title>System herunterfahren</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
  </head>
  <body>
    <div class="wrap stack">
      <h1>System herunterfahren</h1>
      <section class="card stack">
        <div class="warn"><strong>Achtung:</strong> Der Rechner wird sofort gestoppt.</div>
        <form method="post" action="/save-shutdown" class="stack">
          <label>
            Passwort:
            <input type="password" name="password" autocomplete="current-password" required>
          </label>

          <label style="display:flex;gap:8px;align-items:center">
            <input type="checkbox" name="confirm" value="yes" required style="width:auto;min-height:auto">
            Ja, ich möchte dieses System wirklich herunterfahren.
          </label>

          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button type="submit" class="btn danger">Jetzt herunterfahren</button>
            <a href="/" class="btn">Abbrechen</a>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
