<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fertige Bestellungen</title>
    <style>
      body{font-family:system-ui,Arial;margin:0;background:#fff}
      .card{border:none;padding:12px 16px;border-radius:0;max-width:none}
      ul{font-size:1.4rem}
      /* make the header link look like plain text */
      h1 a{color:inherit;text-decoration:none;cursor:default}
      h1 a:focus{outline:none}
    </style>
  </head>
  <body>
    <h1 style="text-align: center;margin:18px 0"><a href="/orders">Bereit zur Abholung</a></h1>
    <div class="card">
      <div id="order-grid" class="grid">
        <div class="tile">(Lädt...)</div>
      </div>
    </div>
    <script>
      async function fetchList(){
        try{
          const resp = await fetch('/api/cooked_unfulfilled', {headers: {'Accept':'application/json'}});
          if(!resp.ok) return;
          const data = await resp.json();
              const grid = document.getElementById('order-grid');
              grid.innerHTML = '';
              const nums = data && data.order_numbers ? data.order_numbers : [];
              if(nums.length === 0){
                const msg = document.createElement('div');
                msg.className = 'tile empty';
                msg.textContent = 'Keine fertigen Bestellungen.';
                grid.appendChild(msg);
                prevNums = nums;
                initial = false;
                return;
              }
              nums.forEach(n => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = n;
                // highlight if this number is new since last poll (but not on initial load)
                if(!initial && prevNums && prevNums.indexOf(n) === -1){
                  tile.classList.add('new');
                  setTimeout(() => tile.classList.remove('new'), 3000);
                }
                grid.appendChild(tile);
              });
              prevNums = nums;
              initial = false;
        }catch(e){
          console.error(e);
        }
      }
          // track previous results to detect new orders
          let prevNums = null;
          let initial = true;
          // initial fetch + periodic polling
          fetchList();
          setInterval(fetchList, 3000);
    </script>
        <style>
          /* make grid span full viewport width */
          .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin:8px 0;width:100vw;margin-left:calc(50% - 50vw);margin-right:calc(50% - 50vw);padding:8px 12px;box-sizing:border-box}
          /* tiles: remove dark border/shadow, keep clean look */
          .tile{background:#fff;border-radius:8px;padding:18px 12px;text-align:center;font-size:1.6rem;font-weight:700;color:#111;border:1px solid #eee}
          .tile.empty{font-size:1rem;font-weight:400;color:#666;padding:14px;border:0}
          /* highlight animation for new tiles */
          @keyframes highlight {
            0%{transform:scale(1.05);box-shadow:0 6px 18px rgba(255,152,0,0.18);background:#fff3e0}
            100%{transform:none;box-shadow:none;background:#fff}
          }
          .tile.new{animation:highlight 1000ms ease-out; border-color:#ff9800}
        </style>
  </body>
</html>
