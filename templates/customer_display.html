<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fertige Bestellungen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
      html,body{height:100%}
      body{margin:0}
      .screen{min-height:100vh;display:flex;flex-direction:column;padding:14px}
      .title{font-size:clamp(42px,6vw,72px);text-align:center;margin:0 0 12px 0}
      .title a{color:inherit;text-decoration:none}
      .grid-wrap{flex:1;min-height:0}
      .grid{height:100%;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));grid-auto-rows:1fr;gap:12px}
      .tile{border-radius:14px;border:1px solid #d7dfef;background:#fff;padding:16px;display:flex;align-items:center;justify-content:center;font-size:clamp(34px,7vw,76px);font-weight:800;letter-spacing:0.02em;min-height:0}
      .tile.empty{grid-column:1 / -1;font-size:24px;font-weight:500;color:#556173;background:#f8fbff}
      @keyframes highlight{
        0%{transform:scale(1.04);box-shadow:0 8px 20px rgba(255,153,0,0.2);background:#fff5e8}
        100%{transform:none;box-shadow:none;background:#fff}
      }
      .tile.new{animation:highlight 1200ms ease-out;border-color:#f0b469}
      @media (max-width:700px){
        .screen{padding:10px}
        .title{font-size:40px;margin-bottom:10px}
        .grid{gap:10px}
      }
    </style>
  </head>
  <body>
    <div class="screen">
      <header>
        <h1 class="title"><a href="/orders">Bereit zur Abholung</a></h1>
      </header>

      <section class="grid-wrap">
        <div id="order-grid" class="grid">
          <div class="tile empty">(Lädt...)</div>
        </div>
      </section>
    </div>

    <script>
      let prevNums = null;
      let initial = true;

      async function fetchList(){
        try{
          const resp = await fetch('/api/cooked_unfulfilled', {headers: {'Accept': 'application/json'}});
          if (!resp.ok) return;
          const data = await resp.json();
          const grid = document.getElementById('order-grid');
          grid.innerHTML = '';
          const nums = data && data.order_numbers ? data.order_numbers : [];
          if (nums.length === 0){
            const msg = document.createElement('div');
            msg.className = 'tile empty';
            msg.textContent = 'Keine fertigen Bestellungen.';
            grid.appendChild(msg);
            prevNums = nums;
            initial = false;
            return;
          }
          nums.forEach(n => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.textContent = n;
            if (!initial && prevNums && prevNums.indexOf(n) === -1){
              tile.classList.add('new');
              setTimeout(() => tile.classList.remove('new'), 3000);
            }
            grid.appendChild(tile);
          });
          prevNums = nums;
          initial = false;
        } catch (e){
          console.error(e);
        }
      }

      fetchList();
      setInterval(fetchList, 3000);
    </script>
  </body>
</html>
