<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bestellungen</title>
    <style>
      body{font-family:system-ui,Arial;margin:20px}
      .extras{margin-top:10px}
      .order-btn{margin-top:12px}
    </style>
  </head>
  <body>
    <h1>Speisekarte</h1>

    <style>
      /* Layout: menu + cart side-by-side on wide screens, stacked on small screens */
      .layout{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:stretch;min-height:calc(100vh - 120px)}
      @media (max-width:900px){ .layout{grid-template-columns:1fr;min-height:initial} }

      /* menu tiles: dynamic columns that fill efficiently */
      #menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;grid-auto-flow:dense}
      .dish-btn{padding:18px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:16px;text-align:center}
      .dish-btn:active{background:#eee}
      /* extras as tile-buttons */
      .extra-btn{display:inline-block;padding:10px 12px;margin:6px 6px 0 0;border-radius:8px;border:1px solid #bbb;background:#e9e9e9;color:#111;font-size:14px}
      .extra-btn.selected{background:#28a745;color:#fff;border-color:#23863a}
      .extra-btn:active{transform:scale(0.98)}
      /* cart area: make right column a column flex so cart can be pushed to bottom */
      aside#config-panel{border-top:1px solid #ddd;padding:12px;display:flex;flex-direction:column}
      #selected-area{display:none}
      #cart{background:#fafafa;padding:12px;border-radius:8px;border:1px solid #eee;margin-top:auto}
      #cart-items div{padding:6px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
      /* toast container adjustment */
      #toast-container{pointer-events:none}
      .toast-message{pointer-events:auto}
    </style>

    <div class="layout">
      <div>
        <div id="menu-grid">
        {% for it in menu %}
        <button class="dish-btn" data-name="{{ it.name }}" data-extras='{{ it.extras|tojson|e }}' {% if it.bg_color %}style="background: {{ it.bg_color }};"{% endif %}>
          {{ it.name }}
        </button>
        {% endfor %}
      </div>
      </div>

      <aside id="config-panel">
      <div id="selected-area">
        <h3 id="sel-name"></h3>
        <div id="sel-extras"></div>
        <div style="margin-top:8px">
          <label>Menge:</label>
          <button id="qty-decr">−</button>
          <span id="qty">1</span>
          <button id="qty-incr">+</button>
        </div>
        <div style="margin-top:8px">
          <button id="add-to-cart">Zum Bestellkorb hinzufügen</button>
          <button id="cancel-item">Abbrechen</button>
        </div>
      </div>

      <div id="cart" style="margin-top:12px">
        <h3>Aktueller Bestellkorb</h3>
        <div id="cart-items"></div>
        <div style="margin-top:8px">
          <label for="notes">Bestell-Notiz (optional)</label>
          <input id="notes" placeholder="z. B. ohne Zwiebeln" />
        </div>
        <div style="margin-top:8px">
          <button id="send-order">Bestellung absenden</button>
          <a href="/orders">Zu den Bestellungen</a>
        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite" style="position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:9999"></div>

    <style>
      .dish-btn{padding:18px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:16px}
      .dish-btn:active{background:#eee}
      #sel-extras label{display:block;margin:6px 0}
      #cart-items div{padding:6px;border-bottom:1px solid #eee}
      button{touch-action:manipulation}
    </style>

    <script>
      const menu = {{ menu|tojson }};
      const menuGrid = document.getElementById('menu-grid');
      const selectedArea = document.getElementById('selected-area');
      const selName = document.getElementById('sel-name');
      const selExtras = document.getElementById('sel-extras');
      const qtyEl = document.getElementById('qty');
      const qtyIncr = document.getElementById('qty-incr');
      const qtyDecr = document.getElementById('qty-decr');
      const addToCartBtn = document.getElementById('add-to-cart');
      const cancelItemBtn = document.getElementById('cancel-item');
      const cartItemsDiv = document.getElementById('cart-items');
      const sendOrderBtn = document.getElementById('send-order');
      const notesInput = document.getElementById('notes');

      let current = null; // {name, extras[], qty}
      let cart = [];

      function showSelected(name, extras){
        current = {name, extras: extras||[], qty:1};
        selName.textContent = name;
        selExtras.innerHTML = '';
        if (extras && extras.length){
          // render extras as tile-buttons (toggle)
          extras.forEach(e=>{
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'extra-btn';
            btn.dataset.value = e;
            btn.textContent = e;
            btn.addEventListener('click', ()=> btn.classList.toggle('selected'));
            selExtras.appendChild(btn);
          });
        }
        qtyEl.textContent = '1';
        selectedArea.style.display = 'block';
        window.scrollTo({top:0,behavior:'smooth'});
      }

      menuGrid.addEventListener('click', (ev)=>{
        const btn = ev.target.closest('.dish-btn');
        if (!btn) return;
        const name = btn.dataset.name;
        const extras = JSON.parse(btn.dataset.extras||'[]');
        showSelected(name, extras);
      });

      qtyIncr.addEventListener('click', ()=>{ current.qty++; qtyEl.textContent = current.qty; });
      qtyDecr.addEventListener('click', ()=>{ if (current.qty>1) current.qty--; qtyEl.textContent = current.qty; });

      cancelItemBtn.addEventListener('click', ()=>{ selectedArea.style.display='none'; current=null; });

      function sameExtras(a,b){
        if (!a && !b) return true;
        a = a||[]; b = b||[];
        if (a.length !== b.length) return false;
        const sa = a.slice().sort().join('|');
        const sb = b.slice().sort().join('|');
        return sa===sb;
      }

      function renderCart(){
        cartItemsDiv.innerHTML='';
        if (!cart.length){ cartItemsDiv.textContent='(leer)'; return; }
        cart.forEach((it, idx)=>{
          const d = document.createElement('div');
          const txt = document.createElement('span');
          txt.textContent = (it.qty>1?it.qty+'x ':'') + it.name + (it.extras && it.extras.length? ' ('+it.extras.join(', ')+')':'');
          d.appendChild(txt);
          const rem = document.createElement('button'); rem.textContent='−'; rem.style.marginLeft='8px';
          rem.addEventListener('click', ()=>{ if (it.qty>1){ it.qty--; } else { cart.splice(idx,1); } renderCart(); });
          const add = document.createElement('button'); add.textContent='+'; add.style.marginLeft='6px'; add.addEventListener('click', ()=>{ it.qty++; renderCart(); });
          d.appendChild(rem); d.appendChild(add);
          cartItemsDiv.appendChild(d);
        });
      }

      addToCartBtn.addEventListener('click', ()=>{
        if (!current) return;
        // collect selected extras from tile buttons
        const chosenElems = selExtras.querySelectorAll('.extra-btn.selected');
        const chosen = Array.from(chosenElems).map(b => b.dataset.value);
        // grouping: find existing with same name and extras
        const found = cart.find(c => c.name===current.name && sameExtras(c.extras, chosen));
        if (found){ found.qty += current.qty; }
        else { cart.push({name: current.name, extras: chosen, qty: current.qty}); }
        selectedArea.style.display='none'; current=null; renderCart();
      });

      function showToast(message, type){
        const container = document.getElementById('toast-container');
        const msg = document.createElement('div');
        msg.className = 'toast-message ' + (type||'');
        msg.style.background = type==='error'? '#ffdddd' : '#222';
        msg.style.color = type==='error'? '#800' : '#fff';
        msg.style.padding = '10px 14px';
        msg.style.borderRadius = '8px';
        msg.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
        msg.style.marginTop = '8px';
        msg.style.minWidth = '180px';
        msg.style.textAlign = 'center';
        msg.textContent = message;
        container.appendChild(msg);
        // auto remove
        setTimeout(()=>{ msg.style.transition = 'opacity 300ms'; msg.style.opacity = '0'; setTimeout(()=>msg.remove(),300); }, 2500);
      }

      sendOrderBtn.addEventListener('click', async ()=>{
        if (!cart.length){ showToast('Der Bestellkorb ist leer', 'error'); return; }
        const items = cart.map(c=>({name:c.name, extras:c.extras, qty:c.qty}));
        const formData = new FormData();
        formData.append('items', JSON.stringify(items));
        formData.append('notes', notesInput.value||'');
        try{
          const resp = await fetch('/order', {method:'POST', body: formData, headers: {'X-Requested-With':'XMLHttpRequest', 'Accept':'application/json'}});
          if (resp.ok){
            const data = await resp.json();
            // clear cart and notes, stay on menu page
            cart = [];
            notesInput.value = '';
            renderCart();
            showToast('Bestellung aufgenommen (Nr. ' + (data.order_number||'?') + ')');
          } else {
            showToast('Fehler beim Absenden der Bestellung', 'error');
          }
        } catch(e){
          console.error(e);
          showToast('Netzwerkfehler beim Absenden', 'error');
        }
      });

      // initial render
      renderCart();

      // set contrasting text color for dish tiles based on computed background
      function parseRgb(value){
        // value like 'rgb(r, g, b)' or 'rgba(r, g, b, a)'
        const m = value.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
        if (m) return [parseInt(m[1],10), parseInt(m[2],10), parseInt(m[3],10)];
        return null;
      }

      function hexToRgb(hex){
        hex = hex.replace('#','');
        if (hex.length === 3) hex = hex.split('').map(h=>h+h).join('');
        const num = parseInt(hex,16);
        return [(num>>16)&255, (num>>8)&255, num&255];
      }

      function luminance(r,g,b){
        const a = [r,g,b].map(v=>{
          v = v/255;
          return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
        });
        return 0.2126*a[0] + 0.7152*a[1] + 0.0722*a[2];
      }

      function contrastRatio(l1, l2){
        const a = Math.max(l1, l2);
        const b = Math.min(l1, l2);
        return (a + 0.05) / (b + 0.05);
      }

      function setContrastForTiles(){
        document.querySelectorAll('.dish-btn').forEach(btn=>{
          const style = getComputedStyle(btn);
          let rgb = parseRgb(style.backgroundColor);
          if (!rgb){
            const inline = btn.getAttribute('style') || '';
            const m = inline.match(/background:\s*([^;]+);?/i);
            if (m){
              const val = m[1].trim();
              if (val.startsWith('#')) rgb = hexToRgb(val);
            }
          }
          if (rgb){
            const lum = luminance(rgb[0], rgb[1], rgb[2]);
            const whiteLum = 1.0;
            const blackLum = 0.0;
            const contrastWithWhite = contrastRatio(whiteLum, lum);
            const contrastWithBlack = contrastRatio(lum, blackLum);
            // Prefer the color with the higher contrast ratio. Aim for >=4.5:1 if possible.
            let chosen = contrastWithWhite >= contrastWithBlack ? '#fff' : '#000';
            // If both are below 4.5, still pick the higher one but favor white for very dark backgrounds
            btn.style.color = chosen;
            // add subtle text-shadow for low contrast cases to improve legibility on reflective screens
            const bestContrast = Math.max(contrastWithWhite, contrastWithBlack);
            if (bestContrast < 4.5){
              // use a thin shadow with opposite color
              const shadowColor = chosen === '#fff' ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.45)';
              btn.style.textShadow = `0 1px 1px ${shadowColor}`;
            } else {
              btn.style.textShadow = '';
            }
          }
        });
      }

      // Run once on load
      setContrastForTiles();
    </script>
  </body>
</html>
