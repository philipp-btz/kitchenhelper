<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Speisekarte bearbeiten</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
      .item{display:grid;grid-template-columns:2fr 120px 160px 2fr auto;gap:10px;align-items:start;padding:12px;border:1px solid #e7ebf3;border-radius:10px;background:#fcfdff}
      .item label{font-weight:600;font-size:14px}
      .extras-list{display:flex;flex-direction:column;gap:6px}
      .extra-row{display:flex;gap:6px;align-items:center}
      .extra-row input{flex:1}
      .color-preview{margin-top:6px;height:30px;border-radius:8px;border:1px solid #99a5bf}
      .btn.small{min-height:34px;margin-top:6px;padding:6px 10px;font-size:14px}
      @media (max-width:980px){
        .item{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <div class="wrap stack">
      <div class="topbar">
        <h1>Speisekarte bearbeiten</h1>
        <a href="/menus" class="btn">Zurück zur Menü-Auswahl</a>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/menus/save" id="menu-form" class="stack">
        <section class="card stack">
          <label for="menu_name"><strong>Menüname</strong></label>
          <input id="menu_name" name="menu_name" type="text" value="{{ menu_name }}" placeholder="z. B. Fruehlingsfest_2026" required>
          <p class="muted">Wird als Dateiname im Ordner <code>menu_list</code> gespeichert.</p>
          <input type="hidden" name="loaded_file" value="{{ loaded_file }}">
          <input type="hidden" name="items_json" id="items_json">
        </section>

        <section class="card stack">
          <div class="topbar">
            <h2>Menü-Items</h2>
            <button type="button" id="add-item" class="btn">+ Item hinzufügen</button>
          </div>
          <div id="items-list" class="stack"></div>
        </section>

        <section class="card">
          <button type="submit" class="btn primary">Speisekarte speichern</button>
        </section>
      </form>
    </div>

    <template id="item-template">
      <div class="item">
        <div>
          <label>Name</label>
          <input class="field-name" type="text" placeholder="Item-Name" required>
        </div>
        <div>
          <label>Drucker</label>
          <select class="field-printer">
            <option value="1">1</option>
            <option value="2">2</option>
          </select>
        </div>
        <div>
          <label>Farbe</label>
          <input class="field-bg" type="color" value="#ffffff">
        </div>
        <div>
          <label>Extras</label>
          <div class="extras-list"></div>
          <button type="button" class="btn small add-extra">+ Extra</button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button type="button" class="btn small danger remove-item">Löschen</button>
        </div>
      </div>
    </template>

    <script>
      const existingItems = {{ items|tojson }};
      const list = document.getElementById('items-list');
      const tpl = document.getElementById('item-template');

      function addExtraRow(extrasList, value){
        const row = document.createElement('div');
        row.className = 'extra-row';
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'field-extra';
        input.placeholder = 'z. B. Extra Kaese';
        input.value = value || '';
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'btn small danger';
        remove.textContent = 'X';
        remove.addEventListener('click', () => row.remove());
        row.appendChild(input);
        row.appendChild(remove);
        extrasList.appendChild(row);
      }

      function addItemRow(item){
        const node = tpl.content.cloneNode(true);
        const row = node.querySelector('.item');
        row.querySelector('.field-name').value = item?.name || '';
        row.querySelector('.field-printer').value = String(item?.printer || 1);
        row.querySelector('.field-bg').value = item?.bg_color || '#ffffff';
        const extrasList = row.querySelector('.extras-list');
        const extras = item?.extras || [];
        if (extras.length){
          extras.forEach(ex => addExtraRow(extrasList, ex));
        } else {
          addExtraRow(extrasList, '');
        }
        row.querySelector('.add-extra').addEventListener('click', () => addExtraRow(extrasList, ''));
        row.querySelector('.remove-item').addEventListener('click', () => row.remove());
        list.appendChild(row);
      }

      if (existingItems.length){
        existingItems.forEach(addItemRow);
      } else {
        addItemRow({name: '', printer: 1, bg_color: '#ffffff', extras: []});
      }

      document.getElementById('add-item').addEventListener('click', () => {
        addItemRow({name: '', printer: 1, bg_color: '#ffffff', extras: []});
      });

      document.getElementById('menu-form').addEventListener('submit', (ev) => {
        const rows = Array.from(document.querySelectorAll('.item'));
        const items = rows.map((row, idx) => {
          const extras = Array.from(row.querySelectorAll('.field-extra'))
            .map(input => (input.value || '').trim())
            .filter(Boolean);
          return {
            id: idx + 1,
            name: (row.querySelector('.field-name').value || '').trim(),
            printer: Number(row.querySelector('.field-printer').value || 1),
            bg_color: row.querySelector('.field-bg').value || '',
            extras
          };
        });

        const hasName = items.some(it => it.name);
        if (!hasName) {
          ev.preventDefault();
          alert('Bitte mindestens ein Menü-Item mit Namen eintragen.');
          return;
        }
        document.getElementById('items_json').value = JSON.stringify(items);
      });
    </script>
  </body>
</html>
