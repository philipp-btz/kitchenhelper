<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload bestätigen</title>
    <style>body{font-family:system-ui,Arial;margin:20px} .card{border:1px solid #ddd;padding:12px;border-radius:6px;max-width:720px}</style>
  </head>
  <body>
    <h1>Datei bereits vorhanden</h1>
    <div class="card">
      <p>Die Datei <strong>{{ filename }}</strong> existiert bereits. Möchtest du sie ersetzen?</p>
      <form method="post" action="/menus/upload" style="display:inline">
        <input type="hidden" name="replace" value="1" />
        <input type="hidden" name="filename" value="{{ filename }}" />
        <button type="submit">Ja, ersetzen</button>
      </form>
      <form method="post" action="/menus/upload" style="display:inline;margin-left:12px">
        <input type="hidden" name="replace" value="2" />
        <input type="hidden" name="filename" value="{{ filename }}" />
        <button type="submit">Nein, nicht ersetzen</button>
      </form>
  </body>
</html>
