<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload bestätigen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
      .actions{display:flex;gap:10px;flex-wrap:wrap}
    </style>
  </head>
  <body>
    <div class="wrap stack">
      <h1>Datei bereits vorhanden</h1>
      <section class="card stack">
        <p>Die Datei <strong>{{ filename }}</strong> existiert bereits. Möchtest du sie ersetzen?</p>
        <div class="actions">
          <form method="post" action="/menus/upload">
            <input type="hidden" name="replace" value="1">
            <input type="hidden" name="filename" value="{{ filename }}">
            <button type="submit" class="btn danger">Ja, ersetzen</button>
          </form>
          <form method="post" action="/menus/upload">
            <input type="hidden" name="replace" value="2">
            <input type="hidden" name="filename" value="{{ filename }}">
            <button type="submit" class="btn">Nein, nicht ersetzen</button>
          </form>
          <a href="/menus" class="btn">Zurück</a>
        </div>
      </section>
    </div>
  </body>
</html>
